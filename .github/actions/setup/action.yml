name: Setup
description: Set up pnpm and Node.js, then install workspace dependencies.

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
