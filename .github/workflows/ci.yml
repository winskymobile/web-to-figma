name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: Build
        run: pnpm build

      - name: Resolve Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm --filter @sleekdesign/dom-to-figma exec playwright --version | awk '{print $2}')" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: pnpm --filter @sleekdesign/dom-to-figma exec playwright install chromium --with-deps

      - name: Test
        run: pnpm test
