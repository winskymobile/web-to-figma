<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
<style>
  body { margin: 0; padding: 32px; font-family: Inter, sans-serif; background: #fafafa; color: #18181b; }
  .card { display: flex; flex-direction: column; gap: 12px; width: 280px; padding: 20px; background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; }
  .card h2 { margin: 0; font-size: 18px; }
  .card p { margin: 0; font-size: 14px; color: #52525b; }
  .row { display: flex; gap: 8px; }
  .row button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .primary { background: #18181b; color: #fff; }
  .ghost { background: #f4f4f5; color: #18181b; }
</style>
<div class="card">
  <h2>Edit me</h2>
  <p>Replace this markup with your own. The middle pane previews it and the right pane shows the Figma payload.</p>
  <div class="row">
    <button class="primary">Primary</button>
    <button class="ghost">Ghost</button>
  </div>
</div>
